<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay with Razorpay</title>
</head>
<body>
    <!-- <h2>Pay for {{ name }} - ₹{{amount }}</h2>
    <button id="rzp-button1">Pay Now</button> -->
    <h2 style="color: #2c3e50; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
           font-size: 28px; background-color: #f4f4f4; padding: 15px 25px; 
           border-radius: 10px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
    Pay for {{ name }} - ₹{{ amount }}
</h2>

<button id="rzp-button1" style="display: block; margin: 30px auto; padding: 12px 30px; 
        background-color: #27ae60; color: white; border: none; border-radius: 8px; 
        font-size: 18px; font-weight: bold; cursor: pointer; 
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); transition: background-color 0.3s ease;">
    Pay Now
</button>


    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        var options = {
            "key": "rzp_test_F5ANeNJTZrJrQS", // Enter your Razorpay Key ID here
            "amount": "{{ order.amount }}", // Amount in paise
            "currency": "INR",
            "name": "{{ name }}",
            "description": "Test Transaction",
            "image": "https://example.com/your_logo",
            "order_id": "{{ order.id }}", // Pass the order ID from Razorpay
            "handler": function (response){
                // Redirect to success route with the payment details
                var form = document.createElement('form');
                form.method = 'POST';
                form.action = '/success';

                form.innerHTML = `
                    <input type="hidden" name="razorpay_payment_id" value="${response.razorpay_payment_id}">
                    <input type="hidden" name="razorpay_order_id" value="${response.razorpay_order_id}">
                    <input type="hidden" name="razorpay_signature" value="${response.razorpay_signature}">
                    <input type="hidden" name="name" value="{{name}}">
                    <input type="hidden" name="itemid" value="{{itemid}}">
                    <input type="hidden" name="quantity" value="{{qyt}}">
                    <input type="hidden" name="total_amount" value="{{amount//100}}">
                `;
                document.body.appendChild(form);
                form.submit();
            },
            "prefill": {
                "name": "Test User",
                "email": "session.get('user')",
                "contact": "9999999999"
            },
            "theme": {
                "color": "#3399cc"
            }
        };
        var rzp1 = new Razorpay(options);
        document.getElementById('rzp-button1').onclick = function(e){
            rzp1.open();
            e.preventDefault();
        }
    </script>
</body>
</html>
