<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Admin Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #000000, #434343);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .form-container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 15px;
            margin-top: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .profile-preview {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #ffc107;
            display: block;
            margin: 0 auto 15px;
        }
    </style>
</head>

<body>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="container" style="max-width: 500px;">
        {% for message in messages %}
        <div class="alert alert-info alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="form-container">
        <h3 class="text-center mb-4">Edit Profile</h3>

        {% if admin_data[6] %}
        <img src="/static/uploads/{{ admin_data[6] }}" class="profile-preview" alt="Profile Picture">
        {% endif %}

        <form method="post" enctype="multipart/form-data">
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" name="fullname" value="{{ admin_data[2] }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" name="username" value="{{ admin_data[0] }}" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Admin Email</label>
                <input type="email" class="form-control" name="adminemail" value="{{ admin_data[3] }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" placeholder="Leave blank to keep current">
            </div>

            <div class="mb-3">
                <label class="form-label">Address</label>
                <textarea class="form-control" name="address" rows="2" required>{{ admin_data[1] }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Role</label>
                <select class="form-select" name="role">
                    <option value="Admin" {% if admin_data[4] == 'Admin' %}selected{% endif %}>Admin</option>
                    <option value="Editor" {% if admin_data[4] == 'Editor' %}selected{% endif %}>Editor</option>
                    <option value="Viewer" {% if admin_data[4] == 'Viewer' %}selected{% endif %}>Viewer</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Update Profile Picture</label>
                <input class="form-control" type="file" name="profile_pic">
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="agree" name="agree" value="on" required>
                <label class="form-check-label" for="agree">I agree to the terms and conditions</label>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-warning fw-bold">Update Profile</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
