<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>View Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
     integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
      body {
        background: #ae0000;
        min-height: 100vh;
        margin: 0;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: #111;
      }
      h1 {
        color: #ffffff;
        margin-top: 40px;
        margin-bottom: 30px;
        font-weight: 700;
        letter-spacing:1px;
        font-family:Georgia, 'Times New Roman', Times, serif;
        text-shadow: 0 6px 32px rgba(254, 254, 254, 0.925);

      }
      .card {
        border: none;
        border-radius: 18px;
        box-shadow: 0 6px 32px rgba(254, 254, 254, 0.925);
        background: #fff;
        margin-top: 30px;
        max-width: 800px; /* Increased card width */
        width: 100%;
      }
      .card .card-body {
        padding: 2rem 1.5rem;
      }
      .card-title, .card-text {
        color: #111;
      }
      .card-title {
        font-weight: 600;
        margin-bottom: 0.5rem;
      }
      .card-text {
        margin-bottom: 1.2rem;
        font-size: 1.05rem;
      }
      .img-container {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        min-height: 220px;
        background: #fff;
        border-radius: 18px 0 0 18px;
        border-right: 4px solid #fd153c;
        padding: 32px 0; /* Add vertical space around image */
      }
      .img-fluid {
        border-radius: 18px 0 0 18px;
        border: none;
        background: #fff;
        object-fit: cover;
        max-width: 120%;
        max-height: 300px;
        height: auto;
        width: auto;
        display: block;
        margin: 0 auto;
      }
      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
      }
      .sec1 {
        width: 100%;
      }
      @media (max-width: 991px) {
        .card {
          max-width: 100%;
        }
      }
      @media (max-width: 767px) {
        .img-container {
          border-radius: 18px 18px 0 0;
          border-right: none;
          border-bottom: 4px solid #d90429;
          padding: 16px 0;
        }
        .img-fluid {
          border-radius: 18px 18px 0 0;
        }
        .card {
          margin-top: 10px;
        }
      }
      /* Red accent bar */
      .accent-bar {
        width: 60px;
        height: 5px;
        background: #fefefe;
        border-radius: 3px;
        margin: 0 auto 20px auto;
        box-shadow: 0 6px 32px rgba(254, 254, 254, 0.925);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="w-100">
        <h1 class="text-center">View Item</h1>
        <div class="accent-bar"></div>
        <section class="sec1">
          <div class="card mb-3 mx-auto">
            <div class="row g-0">
              <div class="col-md-5">
                <div class="img-container">
                  <img src="/static/uploads/{{itemdata[6]}}" class="img-fluid rounded-start" alt="Item image">
                </div>
              </div>
              <div class="col-md-7">
                <div class="card-body">
                  <h5 class="card-title">Item id : {{itemdata[0]}}</h5>
                  <h5 class="card-title">Title : {{itemdata[1]}}</h5>
                  <p class="card-text">Description : {{itemdata[2]}}</p>
                  <h5 class="card-title">Available Items : {{itemdata[3]}}</h5>
                  <h5 class="card-title">Price : {{itemdata[4]}}</h5>
                  <h5 class="card-title">Category : {{itemdata[5]}}</h5>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
