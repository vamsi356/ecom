<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Write a Review</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
      font-family: 'Segoe UI', sans-serif;
      padding: 40px 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
      max-width: 600px;
      margin: auto;
    }

    .rate {
      display: flex;
      flex-direction: row-reverse;
      justify-content: center;
    }

    .rate input {
      display: none;
    }

    .rate label {
      position: relative;
      font-size: 30px;
      color: #ddd;
      cursor: pointer;
    }

    .rate label:before {
      content: "\2605";
    }

    .rate input:checked ~ label,
    .rate label:hover,
    .rate label:hover ~ label {
      color: #ffc107;
    }

    .button-52 {
      background-color: #28a745;
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: bold;
      text-transform: uppercase;
      transition: 0.3s;
    }

    .button-52:hover {
      background-color: #218838;
    }

    textarea {
      resize: vertical;
    }
  </style>
</head>
<body>

  <div class="text-center mb-4">
    <a href="/" class="text-decoration-none">
      <button class="button-52">Go to Home</button>
    </a>
  </div>

  <div class="container">
    <h3 class="mb-4 text-center text-success">Write Your Review</h3>

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Review Title</label>
        <input type="text" name="title" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Review Description</label>
        <textarea name="review" rows="4" class="form-control" required></textarea>
      </div>

      <div class="mb-3 text-center">
        <label class="form-label d-block mb-2">Rate this product</label>
        <div class="rate">
          <input type="radio" id="star5" name="rate" value="5" required />
          <label for="star5" title="5 stars"></label>
          <input type="radio" id="star4" name="rate" value="4" />
          <label for="star4" title="4 stars"></label>
          <input type="radio" id="star3" name="rate" value="3" />
          <label for="star3" title="3 stars"></label>
          <input type="radio" id="star2" name="rate" value="2" />
          <label for="star2" title="2 stars"></label>
          <input type="radio" id="star1" name="rate" value="1" />
          <label for="star1" title="1 star"></label>
        </div>
      </div>

      <div class="text-center">
        <button type="submit" class="button-52">Submit Review</button>
      </div>
    </form>
  </div>

</body>
</html>
