<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Success</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Animate.css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #e0f7e9, #d2f4f1);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .success-box {
            background-color: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .success-icon {
            font-size: 60px;
            color: #28a745;
        }

        .btn-home {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="success-box animate__animated animate__zoomIn">
        <div class="success-icon mb-3">
            <i class="bi bi-check-circle-fill"></i>
        </div>
        <h2 class="text-success mb-3 animate__animated animate__fadeInDown animate__delay-1s">Order Placed Successfully!</h2>
        <p class="text-muted animate__animated animate__fadeInUp animate__delay-2s">
            Thank you for your purchase. Your order has been placed and is being processed.
        </p>
        <a href="/" class="btn btn-success btn-home animate__animated animate__fadeInUp animate__delay-3s">
            <i class="bi bi-house-fill me-1"></i> Go to Homepage
        </a>
    </div>

</body>
</html>
