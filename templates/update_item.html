<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous" />
    <style>
        body {
            background-image: url(https://img.freepik.com/free-photo/futuristic-metaverse-empty-room-product-display-presentation-abstract-technology-scifi-with-neon-light-3d-background_56104-2314.jpg);
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        form {
            width: 100%;
            max-width: 600px; /* Increased width to accommodate larger image */
            height: auto;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0; /* Padding handled by internal containers now */
            border-radius: 15px;
            color: white;
            background: linear-gradient(rgba(255, 0, 0, 0.6), rgba(60, 100, 50, 0.8));
            backdrop-filter: blur(10px);
            overflow: hidden; /* Clips the image corners to the border-radius */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 20px;
        }

        /* The Image Section */
        .image-container {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .image-container img {
            width: 100%;
            max-height: 450px; /* Much taller image display */
            object-fit: contain; /* Keeps aspect ratio without cropping */
            padding: 10px;
        }

        .form-content {
            padding: 25px;
        }

        input[type="number"] {
            width: 100px;
        }

        input[type='file'] {
            margin-top: 10px;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .box {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 10px;
        }

        select {
            padding: 8px;
            border-radius: 5px;
            background: white;
            color: black;
            border: none;
        }

        .btn-warning {
            width: 100%;
            margin-top: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for message in messages %}
      <center style="color: bisque; background: rgba(0,0,0,0.5); width: 100%; padding: 10px;">{{ message }}</center>
    {% endfor %}  
  {% endif %}
{% endwith %}

<body>
    <form method="post" enctype="multipart/form-data">
        <div class="image-container">
            <img src="/static/uploads/{{item_data[6]}}" id="preview" alt="Product Image">
        </div>

        <div class="form-content">
            <div class="mb-3">
                <label for="formFile" class="form-label">Update Product Image</label>
                <input class="form-control" type="file" name="file" id="formFile" onchange="previewImage(event)" />
            </div>

            <div class="mb-3">
                <label for="exampleFormControlInput1" class="form-label">Name</label>
                <input type="text" class="form-control" id="exampleFormControlInput1" placeholder="Title of the item"
                    name="title" value="{{item_data[1]}}"/>
            </div>

            <div class="mb-3">
                <label for="exampleFormControlTextarea1" class="form-label">Description</label>
                <textarea class="form-control" id="exampleFormControlTextarea1" placeholder="Discription of the item"
                    name="Description" rows="3">{{item_data[2]}}</textarea>
            </div>

            <div class="mb-3 box">
                <div>
                    <label class="form-label small">Quantity</label>
                    <input type="number" class="form-control" name="quantity" value="{{item_data[3]}}" required />
                </div>
                <div>
                    <label class="form-label small">Price</label>
                    <input type="number" class="form-control" name="price" value="{{item_data[4]}}" required />
                </div>
                <div class="dropdown">
                    <label class="form-label small d-block">Category</label>
                    <select name="category" id="Category">
                        <option {% if item_data[5] == 'Home appliances' %}selected{% endif %}>Home appliances</option>
                        <option {% if item_data[5] == 'Grocery' %}selected{% endif %}>Grocery</option>
                        <option {% if item_data[5] == 'Fashion' %}selected{% endif %}>Fashion</option>
                        <option {% if item_data[5] == 'Electronics' %}selected{% endif %}>Electronics</option>
                        <option {% if item_data[5] == 'Sports' %}selected{% endif %}>Sports</option>
                    </select>
                </div>
            </div>

            <button class="btn btn-warning">Submit Changes</button>
        </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    
    <script>
        // Live Preview Function
        function previewImage(event) {
            var reader = new FileReader();
            reader.onload = function() {
                var output = document.getElementById('preview');
                output.src = reader.result;
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function category(category) {
            document.getElementById('selector').textContent = category;
        }
    </script>
</body>

</html>
